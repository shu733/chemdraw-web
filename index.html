<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemDraw Web</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:sans-serif; background:#1a1a2e; color:#eee; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

    #toolbar {
      background:#16213e; border-bottom:1px solid #0f3460;
      padding:5px 10px; display:flex; gap:6px; align-items:center; flex-wrap:wrap;
    }
    .tg { display:flex; gap:3px; border-right:1px solid #0f3460; padding-right:6px; align-items:center; }
    .tg:last-child { border-right:none; }
    .tb {
      background:#0f3460; color:#eee; border:1px solid #1a1a6e; border-radius:4px;
      padding:5px 8px; cursor:pointer; font-size:12px; white-space:nowrap; transition:background 0.1s;
    }
    .tb:hover { background:#1a5276; }
    .tb.active { background:#2874a6; border-color:#5dade2; }
    .tg-label { font-size:11px; color:#888; }

    #main { display:flex; flex:1; overflow:hidden; }

    #sidebar {
      width:170px; background:#16213e; border-right:1px solid #0f3460;
      padding:8px; overflow-y:auto; flex-shrink:0;
    }
    #sidebar h3 { font-size:10px; color:#888; margin:10px 0 5px; text-transform:uppercase; letter-spacing:0.5px; }
    #sidebar h3:first-child { margin-top:0; }

    .elem-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:4px; }
    .elem-btn {
      background:#0f3460; border:1px solid #1a1a6e; color:#eee;
      border-radius:3px; padding:4px 2px; cursor:pointer; font-size:11px; text-align:center;
    }
    .elem-btn:hover { background:#1a5276; }
    .elem-btn.active { background:#117a65; border-color:#1abc9c; }

    #elem-custom-row { display:flex; gap:3px; margin-bottom:6px; }
    #elem-custom {
      flex:1; background:#0f3460; border:1px solid #1a1a6e; color:#eee;
      border-radius:3px; padding:3px 5px; font-size:12px; min-width:0;
    }
    #elem-custom-btn { background:#0f3460; border:1px solid #1a1a6e; color:#eee; border-radius:3px; padding:3px 6px; cursor:pointer; font-size:11px; }
    #elem-custom-btn:hover { background:#1a5276; }

    .btn-col { display:flex; flex-direction:column; gap:3px; margin-bottom:4px; }
    .bond-btn {
      background:#0f3460; border:1px solid #1a1a6e; color:#eee;
      border-radius:3px; padding:4px 6px; cursor:pointer; font-size:11px; text-align:left;
    }
    .bond-btn:hover { background:#1a5276; }
    .bond-btn.active { background:#6c3483; border-color:#a569bd; }

    .ring-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; margin-bottom:4px; }
    .ring-btn {
      background:#0f3460; border:1px solid #1a1a6e; color:#eee;
      border-radius:3px; padding:4px 2px; cursor:pointer; font-size:11px; text-align:center;
    }
    .ring-btn:hover { background:#1a5276; }
    .ring-btn.active { background:#2874a6; border-color:#5dade2; }

    .tpl-section { margin-bottom:2px; }
    .tpl-grid { display:grid; grid-template-columns:1fr 1fr; gap:3px; padding:4px 0; }
    .tpl-btn {
      background:#0f3460; border:1px solid #1a1a6e; color:#ddd;
      border-radius:3px; padding:4px 4px; cursor:pointer; font-size:10px; text-align:center;
    }
    .tpl-btn:hover { background:#1a5276; }

    details { margin-bottom:2px; }
    details summary {
      font-size:10px; color:#aaa; cursor:pointer; padding:3px 4px;
      background:#0a1628; border-radius:3px; list-style:none;
      display:flex; align-items:center; gap:4px; user-select:none;
    }
    details summary::-webkit-details-marker { display:none; }
    details summary::before { content:'▶'; font-size:8px; color:#555; transition:transform 0.15s; }
    details[open] summary::before { transform:rotate(90deg); }
    details summary:hover { background:#0f2040; color:#ccc; }
    details[open] summary { color:#ccc; }

    #canvas-container { flex:1; position:relative; overflow:hidden; }
    canvas { display:block; background:#fff; cursor:crosshair; }

    #info-bar {
      background:#16213e; border-top:1px solid #0f3460;
      padding:3px 10px; font-size:11px; color:#aaa; display:flex; gap:12px; align-items:center;
    }
    #smiles-display {
      background:#0d1b2a; border:1px solid #0f3460; border-radius:3px;
      padding:2px 6px; font-family:monospace; font-size:11px; color:#5dade2; flex:1;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .charge-btns { display:flex; gap:3px; margin-bottom:4px; }
    .chg-btn {
      flex:1; background:#0f3460; border:1px solid #1a1a6e; color:#eee;
      border-radius:3px; padding:3px 0; cursor:pointer; font-size:12px; text-align:center;
    }
    .chg-btn:hover { background:#1a5276; }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="tg">
    <button class="tb active" data-tool="draw" onclick="setTool('draw')">鉛筆 (D)</button>
    <button class="tb" data-tool="select" onclick="setTool('select')">選択 (S)</button>
    <button class="tb" data-tool="erase" onclick="setTool('erase')">消去 (E)</button>
  </div>
  <div class="tg">
    <button class="tb" onclick="undo()">元に戻す</button>
    <button class="tb" onclick="redo()">やり直し</button>
    <button class="tb" onclick="clearCanvas()">クリア</button>
  </div>
  <div class="tg">
    <button class="tb" onclick="zoomIn()">拡大 (+)</button>
    <button class="tb" onclick="zoomOut()">縮小 (−)</button>
    <button class="tb" onclick="zoomFit()">全体表示 (0)</button>
  </div>
  <div class="tg">
    <button class="tb" id="btn-bw" onclick="toggleBW()">白黒 (B)</button>
  </div>
  <div class="tg">
    <label class="tb" style="cursor:pointer;">
      MOL読込
      <input type="file" id="mol-input" accept=".mol,.sdf" style="display:none" onchange="importMOL(this)">
    </label>
    <button class="tb" onclick="exportSVG()">SVG出力</button>
    <button class="tb" onclick="callBackend()">SMILES取得</button>
  </div>
  <div class="tg">
    <span class="tg-label">Backend:</span>
    <span id="backend-status" style="font-size:11px;color:#e74c3c;">未接続</span>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <h3>原子</h3>
    <div class="elem-grid" id="element-grid"></div>
    <div id="elem-custom-row">
      <input id="elem-custom" type="text" placeholder="例: Fe" maxlength="3">
      <button id="elem-custom-btn" onclick="setCustomElement()">設定</button>
    </div>

    <h3>結合</h3>
    <div class="btn-col" id="bond-types">
      <button class="bond-btn active" id="bond-single" onclick="setBond(1,'')">─ 単結合</button>
      <button class="bond-btn" id="bond-double" onclick="setBond(2,'')">═ 二重結合</button>
      <button class="bond-btn" id="bond-triple" onclick="setBond(3,'')">≡ 三重結合</button>
      <button class="bond-btn" id="bond-wedge" onclick="setBond(1,'wedge')">▶ ウェッジ (前)</button>
      <button class="bond-btn" id="bond-dash" onclick="setBond(1,'dash')">⋯ 破線 (後)</button>
    </div>

    <h3>電荷 (右クリックで変更)</h3>
    <div class="charge-btns">
      <button class="chg-btn" title="右クリックで電荷を変更できます">+</button>
      <button class="chg-btn">−</button>
    </div>

    <h3>環ツール</h3>
    <div class="ring-grid">
      <button class="ring-btn" data-tool="ring3" onclick="setTool('ring3')">3員環</button>
      <button class="ring-btn" data-tool="ring4" onclick="setTool('ring4')">4員環</button>
      <button class="ring-btn" data-tool="ring5" onclick="setTool('ring5')">5員環</button>
      <button class="ring-btn" data-tool="ring6" onclick="setTool('ring6')">6員環</button>
      <button class="ring-btn" data-tool="ring7" onclick="setTool('ring7')">7員環</button>
      <button class="ring-btn" data-tool="ring8" onclick="setTool('ring8')">8員環</button>
    </div>

    <h3>テンプレート</h3>

    <details>
      <summary>基本環</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('benzene')">ベンゼン</button>
        <button class="tpl-btn" onclick="insertTemplate('cyclohexane')">シクロヘキサン</button>
        <button class="tpl-btn" onclick="insertTemplate('cyclopentane')">シクロペンタン</button>
        <button class="tpl-btn" onclick="insertTemplate('cyclobutane')">シクロブタン</button>
        <button class="tpl-btn" onclick="insertTemplate('cyclopropane')">シクロプロパン</button>
        <button class="tpl-btn" onclick="insertTemplate('naphthalene')">ナフタレン</button>
        <button class="tpl-btn" onclick="insertTemplate('anthracene')">アントラセン</button>
        <button class="tpl-btn" onclick="insertTemplate('phenanthrene')">フェナントレン</button>
        <button class="tpl-btn" onclick="insertTemplate('azulene')">アズレン</button>
        <button class="tpl-btn" onclick="insertTemplate('adamantane')">アダマンタン</button>
      </div>
    </details>

    <details>
      <summary>複素環</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('pyridine')">ピリジン</button>
        <button class="tpl-btn" onclick="insertTemplate('pyrimidine')">ピリミジン</button>
        <button class="tpl-btn" onclick="insertTemplate('pyrazine')">ピラジン</button>
        <button class="tpl-btn" onclick="insertTemplate('pyridazine')">ピリダジン</button>
        <button class="tpl-btn" onclick="insertTemplate('triazine')">トリアジン</button>
        <button class="tpl-btn" onclick="insertTemplate('imidazole')">イミダゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('pyrazole')">ピラゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('oxazole')">オキサゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('isoxazole')">イソオキサゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('thiazole')">チアゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('furan')">フラン</button>
        <button class="tpl-btn" onclick="insertTemplate('thiophene')">チオフェン</button>
        <button class="tpl-btn" onclick="insertTemplate('pyrrole')">ピロール</button>
        <button class="tpl-btn" onclick="insertTemplate('indole')">インドール</button>
        <button class="tpl-btn" onclick="insertTemplate('benzimidazole')">ベンズイミダゾール</button>
        <button class="tpl-btn" onclick="insertTemplate('quinoline')">キノリン</button>
        <button class="tpl-btn" onclick="insertTemplate('isoquinoline')">イソキノリン</button>
        <button class="tpl-btn" onclick="insertTemplate('purine')">プリン</button>
        <button class="tpl-btn" onclick="insertTemplate('porphyrin')">ポルフィリン</button>
      </div>
    </details>

    <details>
      <summary>核酸塩基</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('adenine')">アデニン (A)</button>
        <button class="tpl-btn" onclick="insertTemplate('guanine')">グアニン (G)</button>
        <button class="tpl-btn" onclick="insertTemplate('cytosine')">シトシン (C)</button>
        <button class="tpl-btn" onclick="insertTemplate('thymine')">チミン (T)</button>
        <button class="tpl-btn" onclick="insertTemplate('uracil')">ウラシル (U)</button>
      </div>
    </details>

    <details>
      <summary>アミノ酸 (全20種)</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('glycine')">Gly グリシン</button>
        <button class="tpl-btn" onclick="insertTemplate('alanine')">Ala アラニン</button>
        <button class="tpl-btn" onclick="insertTemplate('valine')">Val バリン</button>
        <button class="tpl-btn" onclick="insertTemplate('leucine')">Leu ロイシン</button>
        <button class="tpl-btn" onclick="insertTemplate('isoleucine')">Ile イソロイシン</button>
        <button class="tpl-btn" onclick="insertTemplate('proline')">Pro プロリン</button>
        <button class="tpl-btn" onclick="insertTemplate('phenylalanine')">Phe フェニルAla</button>
        <button class="tpl-btn" onclick="insertTemplate('tyrosine')">Tyr チロシン</button>
        <button class="tpl-btn" onclick="insertTemplate('tryptophan')">Trp トリプトファン</button>
        <button class="tpl-btn" onclick="insertTemplate('serine')">Ser セリン</button>
        <button class="tpl-btn" onclick="insertTemplate('threonine')">Thr スレオニン</button>
        <button class="tpl-btn" onclick="insertTemplate('cysteine')">Cys システイン</button>
        <button class="tpl-btn" onclick="insertTemplate('methionine')">Met メチオニン</button>
        <button class="tpl-btn" onclick="insertTemplate('aspartate')">Asp アスパラギン酸</button>
        <button class="tpl-btn" onclick="insertTemplate('glutamate')">Glu グルタミン酸</button>
        <button class="tpl-btn" onclick="insertTemplate('asparagine')">Asn アスパラギン</button>
        <button class="tpl-btn" onclick="insertTemplate('glutamine')">Gln グルタミン</button>
        <button class="tpl-btn" onclick="insertTemplate('lysine')">Lys リシン</button>
        <button class="tpl-btn" onclick="insertTemplate('arginine')">Arg アルギニン</button>
        <button class="tpl-btn" onclick="insertTemplate('histidine')">His ヒスチジン</button>
      </div>
    </details>

    <details>
      <summary>糖</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('glucose')">β-D-グルコース</button>
        <button class="tpl-btn" onclick="insertTemplate('galactose')">β-D-ガラクトース</button>
        <button class="tpl-btn" onclick="insertTemplate('fructose')">β-D-フルクトース</button>
        <button class="tpl-btn" onclick="insertTemplate('mannose')">β-D-マンノース</button>
        <button class="tpl-btn" onclick="insertTemplate('ribose')">β-D-リボース</button>
        <button class="tpl-btn" onclick="insertTemplate('deoxyribose')">2-デオキシリボース</button>
        <button class="tpl-btn" onclick="insertTemplate('glucosamine')">グルコサミン</button>
        <button class="tpl-btn" onclick="insertTemplate('glucuronic')">グルクロン酸</button>
      </div>
    </details>

    <details>
      <summary>ヌクレオチド・補酵素</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('ATP')">ATP</button>
        <button class="tpl-btn" onclick="insertTemplate('ADP')">ADP</button>
        <button class="tpl-btn" onclick="insertTemplate('AMP')">AMP</button>
        <button class="tpl-btn" onclick="insertTemplate('GTP')">GTP</button>
        <button class="tpl-btn" onclick="insertTemplate('NAD')">NAD⁺</button>
        <button class="tpl-btn" onclick="insertTemplate('NADH')">NADH</button>
        <button class="tpl-btn" onclick="insertTemplate('FAD')">FAD</button>
        <button class="tpl-btn" onclick="insertTemplate('CoA')">CoA (簡略)</button>
        <button class="tpl-btn" onclick="insertTemplate('heme')">ヘム</button>
        <button class="tpl-btn" onclick="insertTemplate('cAMP')">cAMP</button>
      </div>
    </details>

    <details>
      <summary>脂質・ステロイド</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('cholesterol-ring')">コレステロール環</button>
        <button class="tpl-btn" onclick="insertTemplate('steroid')">ステロイド骨格</button>
        <button class="tpl-btn" onclick="insertTemplate('fatty-acid')">脂肪酸 (C16)</button>
        <button class="tpl-btn" onclick="insertTemplate('glycerol')">グリセロール</button>
      </div>
    </details>

    <details>
      <summary>有機官能基</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('carboxyl')">カルボキシル</button>
        <button class="tpl-btn" onclick="insertTemplate('ester')">エステル</button>
        <button class="tpl-btn" onclick="insertTemplate('amide')">アミド</button>
        <button class="tpl-btn" onclick="insertTemplate('aldehyde')">アルデヒド</button>
        <button class="tpl-btn" onclick="insertTemplate('ketone')">ケトン</button>
        <button class="tpl-btn" onclick="insertTemplate('phosphate')">リン酸基</button>
        <button class="tpl-btn" onclick="insertTemplate('sulfonyl')">スルホニル</button>
        <button class="tpl-btn" onclick="insertTemplate('acetyl')">アセチル</button>
        <button class="tpl-btn" onclick="insertTemplate('nitrile')">ニトリル</button>
        <button class="tpl-btn" onclick="insertTemplate('nitro')">ニトロ</button>
        <button class="tpl-btn" onclick="insertTemplate('epoxide')">エポキシド</button>
        <button class="tpl-btn" onclick="insertTemplate('lactam')">ラクタム (β)</button>
      </div>
    </details>

    <details>
      <summary>薬・生体分子</summary>
      <div class="tpl-grid">
        <button class="tpl-btn" onclick="insertTemplate('aspirin')">アスピリン</button>
        <button class="tpl-btn" onclick="insertTemplate('caffeine')">カフェイン</button>
        <button class="tpl-btn" onclick="insertTemplate('dopamine')">ドーパミン</button>
        <button class="tpl-btn" onclick="insertTemplate('serotonin')">セロトニン</button>
        <button class="tpl-btn" onclick="insertTemplate('adrenaline')">アドレナリン</button>
        <button class="tpl-btn" onclick="insertTemplate('penicillin')">ペニシリン骨格</button>
        <button class="tpl-btn" onclick="insertTemplate('glucose-6p')">グルコース-6-P</button>
        <button class="tpl-btn" onclick="insertTemplate('pyruvate')">ピルビン酸</button>
        <button class="tpl-btn" onclick="insertTemplate('acetyl-coa-simple')">アセチルCoA</button>
        <button class="tpl-btn" onclick="insertTemplate('citric-acid')">クエン酸</button>
      </div>
    </details>

  </div>

  <div id="canvas-container">
    <canvas id="chem-canvas"></canvas>
  </div>
</div>

<div id="info-bar">
  <span>原子: <b id="atom-count">0</b></span>
  <span>結合: <b id="bond-count">0</b></span>
  <span style="flex:1">SMILES: <span id="smiles-display">-</span></span>
  <span id="coords" style="min-width:100px;text-align:right;font-size:10px;color:#666;"></span>
</div>

<script src="app.js?v=1783200000"></script>
</body>
</html>
